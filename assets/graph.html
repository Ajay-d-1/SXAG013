ple</span><br/><span style='color:#f87171;'>\ud83d\udea9 lack of validation for equal access claim</span><br/></div>", "font": {"color": "#e2e8f0", "size": 11, "face": "Outfit, sans-serif"}, "borderWidth": 2, "shadow": true, "year": 2025}, {"id": 8, "label": "Intelligence Unleashed: An argument...", "size": 12, "color": {"background": "rgb(108,92,231)", "border": "rgba(52, 211, 153, 0.8)", "highlight": {"background": "#38bdf8", "border": "#0ea5e9"}}, "shape": "square", "title": "<div style='max-width:320px;font-family:Outfit,sans-serif;'><b style='font-size:14px;color:#f8fafc;'>Intelligence Unleashed: An argument for AI in Education</b><br/><span style='color:#94a3b8;font-size:12px;'>Rosemary Luckin, W. Holmes \u2022 Open Research Online (The Open University) \u2022 2016</span><br/><hr style='border-color:#334155;margin:6px 0;'/><span style='color:#38bdf8;'>Credibility: 0/10</span> &nbsp; <span style='color:#a78bfa;'>Relevance: 8/10</span><br/><span style='color:#64748b;'>Type: survey</span> &nbsp; <span style='color:#64748b;'>Source: OpenAlex</span><br/><hr style='border-color:#334155;margin:6px 0;'/><span style='color:#e2e8f0;font-style:italic;'>\ud83d\udca1 The paper argues for the potential of AIEd to transform education, but relies heavily on theoretical concepts without providing empirical evidence.</span><br/><b style='color:#94a3b8;margin-top:4px;display:block;'>Claims:</b><span style='color:#cbd5e1;'>\u2022 AIEd can improve learning and life outcomes</span><br/><span style='color:#cbd5e1;'>\u2022 AIEd can personalise, flexible, inclusive, and engaging educational experiences</span><br/><span style='color:#f87171;'>\ud83d\udea9 no empirical evidence provided</span><br/><span style='color:#f87171;'>\ud83d\udea9 no specific data used</span><br/><span style='color:#f87171;'>\ud83d\udea9 no quantitative analysis</span><br/></div>", "font": {"color": "#e2e8f0", "size": 11, "face": "Outfit, sans-serif"}, "borderWidth": 2, "shadow": true, "year": 2016}, {"id": 9, "
